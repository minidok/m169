global:
  scrape_interval: 30s
  evaluation_interval: 30s
 
rule_files:
  - alerts.yml
 
scrape_configs:
 
  - job_name: 'nextcloud'
    static_configs:
      - targets: ['nextcloud-exporter:9205']
    scrape_interval: 60s
 
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
 
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

- job_name: 'docker'
  static_configs:
    - targets: ['172.17.0.1:9323']  
    # Docker bridge gateway = Host
    # Setzt voraus: Konfiguration in /etc/docker/daemon.json
    # {
    #     "metrics-addr" : "0.0.0.0:9323"
    # }
    
