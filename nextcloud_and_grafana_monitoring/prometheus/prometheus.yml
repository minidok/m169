global:
  scrape_interval: 30s
  evaluation_interval: 30s
 
rule_files:
  - alerts.yml
 
scrape_configs:
 
  - job_name: 'nextcloud'
    static_configs:
      - targets: ['nextcloud-exporter:9205']
    scrape_interval: 60s
 
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
 
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
